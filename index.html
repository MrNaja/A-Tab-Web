<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>A Tab Web</title>
    <link rel="stylesheet" href="./css/tokens.css" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/responsive.css" />
  </head>
  <body>
    <div class="app-shell">
      <a id="skipLink" class="skip-link" href="#mainContent">跳到主要内容</a>
      <header class="app-header">
        <div class="brand">A Tab</div>
        <div class="header-actions">
          <span id="currentGroupBadge" class="header-badge">0</span>
          <button id="settingsButton" class="icon-button" type="button" aria-label="自定义设置" title="自定义设置">
            <span aria-hidden="true">⚙</span>
          </button>
        </div>
      </header>

      <main id="mainContent" class="app-content" tabindex="-1">
        <aside id="groupsSidebar" class="groups-sidebar" aria-label="书签分组">
          <nav id="groupList" class="group-list" aria-label="书签分组"></nav>
        </aside>

        <section class="content-panel" aria-labelledby="viewTitle">
          <h1 id="viewTitle" class="sr-only" tabindex="-1">起始页</h1>
          <div id="viewStatus" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></div>
          <div id="bookmarksView" class="bookmarks-view"></div>
          <div id="settingsView" class="settings-view" hidden></div>
        </section>
      </main>
    </div>

    <input id="importFileInput" type="file" accept="application/json,.json" hidden />
    <div id="toastRegion" class="toast-region" role="status" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
